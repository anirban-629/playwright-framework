name: Playwright Tests

on:
  push:
    branches: [main]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    env:
      ENV: ${{ secrets.ENV }}
      PARELLAL: ${{ secrets.PARELLAL }}
      HEADLESS: ${{ secrets.HEADLESS }}
      RETRY: ${{ secrets.RETRY }}
      URL: ${{ secrets.URL }}
      QA_URL: ${{ secrets.QA_URL }}
      QA_SPECIFIED_TIMEOUT: ${{ secrets.QA_SPECIFIED_TIMEOUT }}
      UAT_URL: ${{ secrets.UAT_URL }}
      UAT_SPECIFIED_TIMEOUT: ${{ secrets.UAT_SPECIFIED_TIMEOUT }}
      WORKERS: ${{ secrets.WORKERS }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
