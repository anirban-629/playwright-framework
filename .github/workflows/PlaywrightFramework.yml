name: Playwright Tests

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select Environment"
        required: true
        default: "QA"
        type: choice
        options:
          - QA
          - UAT
      reporter:
        description: "Select Reporter"
        required: true
        default: "html"
        type: choice
        options:
          - html
          - allure
          - ortoni
          - all

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'QA' }}

    env:
      ENV: ${{ secrets.ENV }}
      PARALLEL: ${{ secrets.PARALLEL }}
      HEADLESS: ${{ secrets.HEADLESS }}
      RETRY: ${{ secrets.RETRY }}
      URL: ${{ secrets.URL }}
      SPECIFIED_TIMEOUT: ${{ secrets.SPECIFIED_TIMEOUT }}
      WORKERS: ${{ secrets.WORKERS }}
      TEST_TIMEOUT: ${{ secrets.TEST_TIMEOUT }}
      EXPECT_TIMEOUT: ${{ secrets.EXPECT_TIMEOUT }}
      ACTION_TIMEOUT: ${{ secrets.ACTION_TIMEOUT }}
      NAV_TIMEOUT: ${{ secrets.NAV_TIMEOUT }}

    steps:
      # ── Setup ──────────────────────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # ── Run Tests (single run, all reporters configured in playwright.config.ts) ──
      - name: Run Playwright Tests
        run: npx playwright test

      # ── Generate Reports using package.json commands ────────────────────────
      # Generate HTML Report
      - name: Generate HTML Report
        if: >
          !cancelled() && (
            github.event_name == 'push' ||
            github.event.inputs.reporter == 'html' ||
            github.event.inputs.reporter == 'all'
          )
        run: npm run report:html -- --reporter=json 2>/dev/null || true
        # Note: report:html just shows the report locally
        # In CI we just upload the already generated playwright-report/ folder

      # Generate Allure Report
      - name: Generate Allure Report
        if: >
          !cancelled() && (
            github.event.inputs.reporter == 'allure' ||
            github.event.inputs.reporter == 'all'
          )
        run: npx allure generate ./allure-results --clean -o ./allure-report

      # ── Upload Reports ──────────────────────────────────────────────────────
      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        if: >
          !cancelled() && (
            github.event_name == 'push' ||
            github.event.inputs.reporter == 'html' ||
            github.event.inputs.reporter == 'all'
          )
        with:
          name: playwright-html-${{ github.event.inputs.environment || 'QA' }}-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: >
          !cancelled() && (
            github.event.inputs.reporter == 'allure' ||
            github.event.inputs.reporter == 'all'
          )
        with:
          name: allure-report-${{ github.event.inputs.environment || 'QA' }}-${{ github.run_id }}
          path: allure-report/
          retention-days: 30

      - name: Upload Ortoni Report
        uses: actions/upload-artifact@v4
        if: >
          !cancelled() && (
            github.event.inputs.reporter == 'ortoni' ||
            github.event.inputs.reporter == 'all'
          )
        with:
          name: ortoni-report-${{ github.event.inputs.environment || 'QA' }}-${{ github.run_id }}
          path: ortoni-report/
          retention-days: 30

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: >
          !cancelled()
        with:
          name: Logs-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: logs/
          retention-days: 30
